<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Futures (GC) — OI Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-muted: #848d97;
            --gold: #d4af37;
            --cyan: #39c5bb;
            --red: #f85149;
            --green: #3fb950;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Syne', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--gold);
            letter-spacing: -1px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .oi-val { color: var(--gold); }
        .vol-val { color: var(--cyan); }

        /* Chart Section */
        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            height: 500px;
            position: relative;
        }

        /* Table Section */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: rgba(48, 54, 61, 0.4);
            color: var(--text-muted);
            font-weight: normal;
        }

        .up { color: var(--green); }
        .down { color: var(--red); }

        /* Spinner & Messages */
        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .error {
            color: var(--red);
            text-align: center;
            padding: 2rem;
            border: 1px dashed var(--red);
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 1.8rem; }
            .chart-container { height: 350px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⬡ Gold Futures (GC) OI Tracker</h1>

        <div id="loader">Loading data from vault...</div>
        <div id="error-msg" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Latest Open Interest</div>
                    <div id="stat-oi" class="stat-value oi-val">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Latest Volume</div>
                    <div id="stat-vol" class="stat-value vol-val">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">7D Avg Volume</div>
                    <div id="stat-avg-vol" class="stat-value">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">OI Peak (14D)</div>
                    <div id="stat-peak-oi" class="stat-value">--</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="table-wrapper">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Open Interest</th>
                            <th>OI Change</th>
                            <th>Volume</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const formatNum = (num) => new Intl.NumberFormat().format(num);

        async function init() {
            try {
                const response = await fetch('./data/gold_oi.json');
                if (!response.ok) throw new Error("Data file not found or inaccessible.");
                const data = await response.json();
                
                if (!data.records || data.records.length === 0) {
                    throw new Error("Data file is empty.");
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

                renderDashboard(data.records);
            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-msg').innerText = `[!] Error: ${err.message}`;
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('error-msg').classList.add('error');
            }
        }

        function renderDashboard(records) {
            const latest = records[records.length - 1];
            const sortedRecords = [...records].sort((a,b) => b.open_interest - a.open_interest);
            const peakOi = sortedRecords[0].open_interest;
            
            const last7 = records.slice(-7);
            const avgVol = Math.round(last7.reduce((acc, r) => acc + r.volume, 0) / last7.length);

            document.getElementById('stat-oi').innerText = formatNum(latest.open_interest);
            document.getElementById('stat-vol').innerText = formatNum(latest.volume);
            document.getElementById('stat-avg-vol').innerText = formatNum(avgVol);
            document.getElementById('stat-peak-oi').innerText = formatNum(peakOi);

            renderChart(records);
            renderTable(records);
        }

        function renderChart(records) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const labels = records.map(r => r.date);
            const oiData = records.map(r => r.open_interest);
            const volData = records.map(r => r.volume);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Volume',
                            data: volData,
                            backgroundColor: 'rgba(57, 197, 187, 0.4)',
                            borderColor: '#39c5bb',
                            borderWidth: 1,
                            yAxisID: 'y1',
                        },
                        {
                            label: 'Open Interest',
                            data: oiData,
                            type: 'line',
                            borderColor: '#d4af37',
                            backgroundColor: '#d4af37',
                            borderWidth: 3,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            tension: 0.3,
                            yAxisID: 'y',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: {
                            grid: { color: '#30363d' },
                            ticks: { font: { family: 'Space Mono' }, color: '#848d97' }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: 'Open Interest', color: '#d4af37' },
                            grid: { color: '#30363d' },
                            ticks: { font: { family: 'Space Mono' }, color: '#848d97' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: 'Volume', color: '#39c5bb' },
                            grid: { drawOnChartArea: false },
                            ticks: { font: { family: 'Space Mono' }, color: '#848d97' }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e6edf3',
                                font: { family: 'Syne', size: 14 }
                            }
                        },
                        tooltip: {
                            backgroundColor: '#161b22',
                            borderColor: '#30363d',
                            borderWidth: 1,
                            titleFont: { family: 'Syne' },
                            bodyFont: { family: 'Space Mono' }
                        }
                    }
                }
            });
        }

        function renderTable(records) {
            const tbody = document.querySelector('#data-table tbody');
            const reversed = [...records].reverse();
            
            reversed.forEach((r, idx) => {
                const prev = reversed[idx + 1];
                let diffStr = '--';
                let diffClass = '';
                
                if (prev) {
                    const diff = r.open_interest - prev.open_interest;
                    const sign = diff >= 0 ? '+' : '';
                    diffStr = `${sign}${formatNum(diff)}`;
                    diffClass = diff >= 0 ? 'up' : 'down';
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.date}</td>
                    <td>${formatNum(r.open_interest)}</td>
                    <td class="${diffClass}">${diffStr}</td>
                    <td>${formatNum(r.volume)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        init();
    </script>
</body>
</html>
